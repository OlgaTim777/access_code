<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genially Access Code Editor</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-hover: #5b4bc4;
            --bg-dark: #1e1e2f;
            --panel-bg: #2a2a40;
            --text-light: #f5f6fa;
            --border: #3d3d5c;
            --neon-glow: 0 0 10px rgba(108, 92, 231, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .editor-container {
            width: 400px;
            background-color: var(--panel-bg);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .preview-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: repeating-linear-gradient(45deg, #222, #222 10px, #262626 10px, #262626 20px);
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--primary);
            text-shadow: var(--neon-glow);
            margin-bottom: 10px;
            text-align: center;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: #b2bec3; }

        input[type="text"], input[type="color"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1a1a2e;
            color: white;
            outline: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            box-shadow: var(--neon-glow);
        }

        .preview-wrapper {
            flex-grow: 1;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        iframe#preview-frame { width: 100%; height: 100%; border: none; }

        textarea {
            width: 100%;
            height: 100px;
            background: #1a1a2e;
            color: #4cd137;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            resize: none;
            font-family: monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>Настройки защиты</h2>
        <div class="control-group">
            <label>Цвет фона</label>
            <input type="color" id="bgColor" value="#1a1a2e">
        </div>
        <div class="control-group">
            <label>Фоновая картинка</label>
            <input type="file" id="bgImage" accept="image/*">
        </div>
        <div class="control-group">
            <label>Заголовок</label>
            <input type="text" id="titleText" value="Доступ к игре">
        </div>
        <div class="control-group">
            <label>Плейсхолдер</label>
            <input type="text" id="placeholderText" value="Введите ваш email">
        </div>
        <div class="control-group">
            <label>Текст кнопки</label>
            <input type="text" id="btnText" value="Войти">
        </div>
        <div class="control-group">
            <label>Текст ошибки</label>
            <input type="text" id="errorText" value="Доступ запрещен. Проверьте почту.">
        </div>

        <div class="output-group">
            <h2>Код для Genially</h2>
            <button class="btn" id="copyBtn" style="width:100%; margin-bottom:10px;">Копировать iframe</button>
            <textarea id="outputCode" readonly></textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="preview-wrapper">
            <iframe id="preview-frame"></iframe>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTm4-QeBC_DQTyLldI-j-Yi7EOuwp1J5cRVXEmU0BGAlRPBcrwXAQEc9B9TCyryc7Dp5USQLRxoe4k3/pub?output=csv";
        let currentBgImageBase64 = "";

        const inputs = {
            bgColor: document.getElementById('bgColor'),
            bgImage: document.getElementById('bgImage'),
            titleText: document.getElementById('titleText'),
            placeholderText: document.getElementById('placeholderText'),
            btnText: document.getElementById('btnText'),
            errorText: document.getElementById('errorText')
        };

        const previewFrame = document.getElementById('preview-frame');
        const outputCode = document.getElementById('outputCode');
        const copyBtn = document.getElementById('copyBtn');

        inputs.bgImage.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { currentBgImageBase64 = e.target.result; updatePreview(); };
                reader.readAsDataURL(file);
            }
        });

        Object.keys(inputs).forEach(id => {
            if(id !== 'bgImage') inputs[id].addEventListener('input', updatePreview);
        });

        function generateHTML() {
            const bg = currentBgImageBase64 ? `url('${currentBgImageBase64}') center/cover` : inputs.bgColor.value;
            return `<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>body,html{margin:0;padding:0;width:100%;height:100%;font-family:sans-serif;overflow:hidden;transition:opacity .8s}#lock{width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:${bg}}.card{background:rgba(255,255,255,.1);backdrop-filter:blur(15px);padding:40px;border-radius:20px;border:1px solid rgba(255,255,255,.2);text-align:center;color:#fff}input{width:100%;padding:15px;border-radius:10px;border:none;margin:20px 0;box-sizing:border-box}button{width:100%;padding:15px;border:none;border-radius:10px;background:#6c5ce7;color:#fff;font-weight:bold;cursor:pointer}.error{color:#ff7675}</style></head><body><div id="lock"><div class="card"><h1>${inputs.titleText.value}</h1><input type="email" id="email" placeholder="${inputs.placeholderText.value}"><button onclick="check()">${inputs.btnText.value}</button><div id="msg"></div></div></div><script>async function check(){const i=document.getElementById("email").value.trim().toLowerCase();if(!i)return;try{const r=await fetch("${CSV_URL}");const d=await r.text();if(d.toLowerCase().includes(i)){document.getElementById("msg").innerHTML="Успех!";setTimeout(()=>{document.body.style.opacity="0";setTimeout(()=>document.body.style.pointerEvents="none",800)},500)}else{document.getElementById("msg").innerHTML='<span class="error">${inputs.errorText.value}</span>'}}catch(e){}}<\/script></body></html>`;
        }

        function updatePreview() {
            const html = generateHTML();
            previewFrame.srcdoc = html;
            
            // Профессиональное решение: используем скрипт-обертку, который сам создает Blob
            // Это гарантирует работу iframe в любом окружении Genially
            const escapedHtml = html.replace(/`/g, '\\`').replace(/\$/g, '\\$');
            const loader = `
                <script>
                    const h = \`${escapedHtml}\`;
                    const b = new Blob([h], {type: 'text/html'});
                    window.location.replace(URL.createObjectURL(b));
                <\/script>
            `;
            const encodedLoader = encodeURIComponent(loader.trim());
            outputCode.value = `<iframe style="width:100%;height:100%;border:none;background:transparent;" src="data:text/html;charset=utf-8,${encodedLoader}"></iframe>`;
        }

        copyBtn.addEventListener('click', () => {
            outputCode.select();
            document.execCommand('copy');
            copyBtn.innerText = "Готово!";
            setTimeout(() => copyBtn.innerText = "Копировать iframe", 2000);
        });

        updatePreview();
    </script>
</body>
</html>
