<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genially Access Code Editor v16 Fixed</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-hover: #5b4bc4;
            --bg-dark: #1e1e2f;
            --panel-bg: #2a2a40;
            --text-light: #f5f6fa;
            --border: #3d3d5c;
            --neon-glow: 0 0 10px rgba(108, 92, 231, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .editor-container {
            width: 400px;
            background-color: var(--panel-bg);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .preview-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: repeating-linear-gradient(45deg, #222, #222 10px, #262626 10px, #262626 20px);
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--primary);
            text-shadow: var(--neon-glow);
            margin-bottom: 10px;
            text-align: center;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; color: #b2bec3; }

        input[type="text"], input[type="color"], select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1a1a2e;
            color: white;
            outline: none;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            box-shadow: var(--neon-glow);
        }

        .preview-wrapper {
            flex-grow: 1;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
            position: relative;
        }

        iframe#preview-frame { width: 100%; height: 100%; border: none; }

        textarea {
            width: 100%;
            height: 100px;
            background: #1a1a2e;
            color: #4cd137;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            resize: none;
            font-family: monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>Настройки защиты</h2>
        <div class="control-group">
            <label>Цвет фона</label>
            <input type="color" id="bgColor" value="#1a1a2e">
        </div>
        <div class="control-group">
            <label>Заголовок</label>
            <input type="text" id="titleText" value="Доступ к игре">
        </div>
        <div class="control-group">
            <label>Текст ошибки</label>
            <input type="text" id="errorText" value="Почты нет в списке">
        </div>
        
        <div class="control-group">
            <label>Анимация исчезновения</label>
            <select id="animType">
                <option value="fade">Раствориться</option>
                <option value="slideUp">Уехать вверх</option>
                <option value="shrink">Уменьшиться</option>
            </select>
        </div>

        <div class="output-group">
            <h2>Код для Genially</h2>
            <button class="btn" id="copyBtn" style="width:100%; margin-bottom:10px;">Копировать iframe</button>
            <textarea id="outputCode" readonly></textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="preview-wrapper">
            <iframe id="preview-frame"></iframe>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTm4-QeBC_DQTyLldI-j-Yi7EOuwp1J5cRVXEmU0BGAlRPBcrwXAQEc9B9TCyryc7Dp5USQLRxoe4k3/pub?output=csv";

        const inputs = {
            bgColor: document.getElementById('bgColor'),
            titleText: document.getElementById('titleText'),
            errorText: document.getElementById('errorText'),
            animType: document.getElementById('animType')
        };

        const previewFrame = document.getElementById('preview-frame');
        const outputCode = document.getElementById('outputCode');

        Object.keys(inputs).forEach(id => inputs[id].addEventListener('input', updatePreview));

        function generateHTML() {
            return `<!DOCTYPE html>
<html>
<head>
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:sans-serif;}
        #lock{width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:${inputs.bgColor.value};color:white;text-align:center;}
        input{padding:10px;border-radius:5px;border:none;margin:10px;}
        button{padding:10px 20px;border-radius:5px;border:none;background:#6c5ce7;color:white;cursor:pointer;}
        .spinner {display:none;width:30px;height:30px;border:4px solid #fff;border-top:4px solid #6c5ce7;border-radius:50%;animation:spin 1s linear infinite;margin:10px auto;}
        @keyframes spin {100%{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <div id="lock">
        <div>
            <h1>${inputs.titleText.value}</h1>
            <input type="email" id="email" placeholder="Email...">
            <button onclick="check()">Войти</button>
            <div id="spinner" class="spinner"></div>
            <div id="msg" style="color:#ff7675;margin-top:10px;"></div>
        </div>
    </div>
    <script>
        async function check() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const msg = document.getElementById('msg');
            const spinner = document.getElementById('spinner');
            if(!email) return;
            
            msg.innerText = '';
            spinner.style.display = 'block';

            try {
                const res = await fetch("${CSV_URL}&cb=" + Date.now());
                const text = await res.text();
                const emails = text.split('\\n').map(e => e.trim().toLowerCase());
                
                if(emails.includes(email)) {
                    localStorage.setItem('auth_gen', email);
                    window.parent.postMessage("unlock_genially|${inputs.animType.value}", "*");
                } else {
                    msg.innerText = "${inputs.errorText.value}";
                }
            } catch(e) { msg.innerText = "Ошибка сети"; }
            spinner.style.display = 'none';
        }

        window.onload = () => {
            if(localStorage.getItem('auth_gen')) {
                window.parent.postMessage("unlock_genially|${inputs.animType.value}", "*");
            }
        };
    <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const html = generateHTML();
            previewFrame.srcdoc = html;
            const escaped = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            
            outputCode.value = `
<div id="genially_lock_wrapper" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:999999; transition: all 0.8s ease-in-out;">
    <iframe id="lock_frame" style="width:100%; height:100%; border:none;" srcdoc="${escaped}"></iframe>
    <script>
        window.addEventListener('message', function(event) {
            if (event.data.startsWith('unlock_genially')) {
                const parts = event.data.split('|');
                const anim = parts[1];
                const wrapper = document.getElementById('genially_lock_wrapper');
                
                if(wrapper) {
                    // ГЛАВНОЕ ИСПРАВЛЕНИЕ: Мгновенно отключаем блокировку кликов
                    wrapper.style.pointerEvents = 'none';
                    wrapper.style.zIndex = '-1';
                    wrapper.style.opacity = '0';
                    
                    if(anim === 'slideUp') wrapper.style.transform = 'translateY(-100%)';
                    if(anim === 'shrink') wrapper.style.transform = 'scale(0)';

                    // Полное удаление элемента через секунду
                    setTimeout(() => wrapper.remove(), 1000);
                }
            }
        }, false);
    <\/script>
</div>`.trim();
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            outputCode.select();
            document.execCommand('copy');
            alert("Код скопирован!");
        });

        updatePreview();
    </script>
</body>
</html>
